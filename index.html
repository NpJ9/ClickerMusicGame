<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link href="styles.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <title>Tap Game</title>
  </head>
  <body>
    <canvas id="canvas" class="endgame"></canvas>

    <!-- In-game HUD -->
    <div class="hud hidden" id="hud">
      <div class="hud_item">
        <span class="hud_value counter" id="counter">0</span>
        <span class="hud_label">HITS</span>
      </div>
      <span class="hud_timer" id="timer">0</span>
      <div class="hud_item">
        <span class="hud_value missed" id="missed">0</span>
        <span class="hud_label">MISSES</span>
      </div>
    </div>

    <!-- Start button -->
    <button class="start" id="start">Start</button>

    <!-- Setup panel -->
    <div class="setup_panel" id="setup_panel">
      <p class="setup_title">Game Setup</p>

      <div class="setup_section">
        <p class="setup_label">Level</p>
        <div class="setup_row">
          <button class="setup_btn" data-level="0">Normal</button>
          <button class="setup_btn" data-level="1">Hard</button>
        </div>
      </div>

      <div class="setup_section">
        <p class="setup_label">Photos</p>
        <div class="setup_row">
          <button class="setup_btn" data-photo="chloe">Chloe</button>
          <button class="setup_btn" data-photo="jack">Jack</button>
          <button class="setup_btn" data-photo="both">Both</button>
        </div>
      </div>

      <button class="play_btn" id="play_btn" disabled>Play!</button>
    </div>

    <!-- End screen -->
    <div class="win_container" id="win_container">
      <div class="win_title">Game Over</div>
      <div class="win_level" id="win_level">Easy</div>
      <div class="win_stats">
        <div class="win_stat">
          <span class="win_stat_value counter" id="final_hits">0</span>
          <span class="win_stat_label">HITS</span>
        </div>
        <div class="win_stat">
          <span class="win_stat_value missed" id="final_misses">0</span>
          <span class="win_stat_label">MISSES</span>
        </div>
        <div class="win_stat">
          <span class="win_stat_value" id="final_accuracy">0%</span>
          <span class="win_stat_label">ACCURACY</span>
        </div>
      </div>
      <div class="win_score" id="win_score">Score: 0</div>
      <button class="reset" id="reset">Play Again</button>
    </div>
  </body>
  <script src="script.js"></script>
</html>
